<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hovakimyan's Family — Premium Footwear</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ԴԻԶԱՅՆ ԵՎ ՈՃԵՐ - ՊԱՀՊԱՆՎԱԾ ԵՆ ԱՆՓՈՓՈԽ */
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#f5f1eb;--dark:#1a1a1a;--mid:#6b6560;--accent:#8b6f47;--border:#e0d9d0;--white:#fff}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden}

nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:68px;background:rgba(245,241,235,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 40px}
.logo{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:500;letter-spacing:.5px;color:var(--dark);cursor:pointer}
.logo span{color:var(--accent);font-style:italic}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links li{cursor:pointer;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mid);transition:color .2s}
.nav-links li:hover{color:var(--dark)}

.pg{display:none; min-height:100vh}
.pg.on{display:block}

.hero{margin-top:68px;height:calc(100vh - 68px);display:grid;grid-template-columns:1fr 1fr}
.hero-l{background:var(--dark);display:flex;flex-direction:column;justify-content:center;padding:80px 60px;z-index:2}
.hero-eyebrow{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
.hero-h1{font-family:'Cormorant Garamond',serif;font-size:60px;font-weight:300;line-height:1.1;color:#fff;margin-bottom:20px}
.hero-h1 span{display:block}
.hero-h1 em{color:var(--accent);font-style:italic}
.hero-sub{font-size:13px;color:#aaa;line-height:1.9;max-width:360px;font-weight:300;margin-bottom:44px}
.hero-r{position:relative; overflow:hidden}
.hero-r img{width:100%;height:100%;object-fit:cover}

.sec-padding{padding:80px 40px}
.sec-header{text-align:center;margin-bottom:50px}
.sec-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:15px;display:block}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300}

.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:0 40px 80px;max-width:1000px;margin:0 auto}
.cat-tile{position:relative;overflow:hidden;aspect-ratio:1/1;cursor:pointer;background:var(--white);border:1px solid var(--border)}
.cat-tile img{width:100%;height:100%;object-fit:cover;transition:transform .6s;opacity:.9}
.cat-tile:hover img{transform:scale(1.05);opacity:1}
.cat-tile-info{position:absolute;bottom:0;left:0;right:0;padding:30px;background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 100%)}
.cat-name{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:#fff}

.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:40px;max-width:1300px;margin:0 auto}
.prod-card{background:#fff;cursor:pointer;border:1px solid var(--border);transition:0.3s}
.prod-card img{width:100%; aspect-ratio:1/1; object-fit:cover}
.prod-info{padding:20px}

.det-grid { display: grid; grid-template-columns: 1.2fr 1fr; margin-top: 68px; background: #fff; min-height: calc(100vh - 68px); }
.det-img { height: 100%; position: sticky; top: 68px; }
.det-img img { width: 100%; height: 100%; object-fit: cover; }
.det-info { padding: 80px 60px; display: flex; flex-direction: column; justify-content: center; }
.size-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin: 25px 0 35px; max-width: 400px; }
.sz { border: 1px solid var(--border); padding: 12px 0; text-align: center; cursor: pointer; font-size: 14px; }
.sz.on { background: var(--dark); color: white; border-color: var(--dark); }

.btn-wa { background: #25D366; color: #fff; padding: 18px 30px; text-decoration: none; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; border: none; cursor: pointer; }
.control-btn{background:transparent;border:1px solid var(--border);padding:5px 10px;cursor:pointer;font-size:10px}
.active-btn{background:var(--dark);color:#fff}

#admin-panel { display:none; background:#fff; padding:40px; border:3px solid var(--accent); max-width:1200px; margin:20px auto; z-index:2000; position:relative;}
.admin-input-group { margin-bottom:15px; display: flex; flex-direction: column; }
.admin-input-group label { font-size: 12px; font-weight: bold; margin-bottom: 5px; }
.admin-input-group input, .admin-input-group select, .admin-input-group textarea { padding: 10px; border: 1px solid #ddd; font-family: inherit; }

footer{background:var(--dark);color:#999;padding:80px 40px 40px;text-align:center}
.f-logo{font-family:'Cormorant Garamond',serif;font-size:28px;color:#fff;margin-bottom:20px; cursor: pointer;}

@media(max-width:900px){
    .hero, .det-grid, .cat-grid, .prod-grid{grid-template-columns:1fr}
    .hero-r, .nav-links{display:none}
    .hero-l{padding: 60px 30px}
    .det-img{height:50vh; position: relative; top:0}
}
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="go('home')">Hovakimyan's <span>Family</span></div>
  <ul class="nav-links">
    <li onclick="go('home')" data-key="nav_home">Գլխավոր</li>
    <li onclick="go('cat')" data-key="nav_shop">Խանութ</li>
  </ul>
  <div style="display:flex;gap:10px">
    <div style="display:flex;gap:2px">
      <button class="control-btn" id="lHY" onclick="window.setLang('hy')">ՀՅ</button>
      <button class="control-btn" id="lEN" onclick="window.setLang('en')">EN</button>
      <button class="control-btn" id="lRU" onclick="window.setLang('ru')">RU</button>
    </div>
    <div style="display:flex;gap:2px">
      <button class="control-btn" id="cAMD" onclick="window.setCur('AMD')">֏</button>
      <button class="control-btn" id="cUSD" onclick="window.setCur('USD')">$</button>
      <button class="control-btn" id="cRUB" onclick="window.setCur('RUB')">₽</button>
    </div>
  </div>
</nav>

<div class="pg on" id="pg-home">
  <div class="hero">
    <div class="hero-l">
      <p class="hero-eyebrow" data-key="hero_eyebrow">PREMIUM COLLECTION</p>
      <h1 class="hero-h1"><span data-key="hero_title">Ստեղծված</span> <em data-key="hero_title_em">Նրանց համար</em></h1>
      <p class="hero-sub" data-key="hero_sub">Պրեմիում կոշիկներ: Բարձրակարգ արհեստ, 39–44 չափսեր:</p>
      <button class="btn-wa" style="background:var(--accent)" onclick="go('cat')" data-key="btn_shop">Դիտել հավաքածուն</button>
    </div>
    <div class="hero-r"><img id="hero-main-img" src=""></div>
  </div>
  <section class="sec-padding">
    <div class="sec-header">
      <span class="sec-label" data-key="cat_label">Ոճը ըստ տեսակի</span>
      <h2 class="sec-title" data-key="cat_title">Մեր հավաքածուն</h2>
    </div>
    <div class="cat-grid" id="home-cat-grid"></div>
  </section>
</div>

<div class="pg" id="pg-cat">
    <div style="text-align:center; padding:120px 40px 40px"><h2 class="sec-title" data-key="nav_shop">Խանութ</h2></div>
    <div class="cat-grid" id="shop-cat-grid"></div>
</div>

<div class="pg" id="pg-shop">
  <div style="text-align:center; padding:120px 40px 40px">
    <h2 id="shop-title" class="sec-title"></h2>
    <p onclick="go('cat')" style="cursor:pointer; text-decoration:underline; font-size:12px; margin-top:15px" data-key="back">← Վերադառնալ</p>
  </div>
  <div class="prod-grid" id="shop-grid"></div>
</div>

<div class="pg" id="pg-detail">
  <div class="det-grid" id="detail-content"></div>
</div>

<footer>
    <div class="f-logo" id="admin-trigger">Hovakimyan's <span>Family</span></div>
    <p>© 2026 Hovakimyan's Family.</p>
</footer>

<div id="admin-panel">
    <h2>Ադմին Պանել</h2>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px">
        <div class="admin-input-group">
            <label>Նկար (Բարձր որակ, ավտոմատ օպտիմալացում)</label>
            <input type="file" id="adm-file" accept="image/*">
            <input type="hidden" id="adm-img-base64">
            <div id="file-size-info" style="font-size:10px; color:var(--accent)"></div>
        </div>
        <div class="admin-input-group"><label>Տեսակ</label><select id="adm-cat"><option value="sneakers">Sneakers</option><option value="loafers">Loafers</option></select></div>
        <div class="admin-input-group"><label>Անուն (HY)</label><input type="text" id="adm-name-hy"></div>
        <div class="admin-input-group"><label>Գին (AMD)</label><input type="number" id="adm-price"></div>
        <div class="admin-input-group"><label>Ինֆո (HY)</label><textarea id="adm-desc-hy"></textarea></div>
        <div class="admin-input-group"><label>Անուն (EN)</label><input type="text" id="adm-name-en"></div>
        <div class="admin-input-group"><label>Անուն (RU)</label><input type="text" id="adm-name-ru"></div>
    </div>
    <button id="adm-main-btn" onclick="window.addNewProduct()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; margin-top:10px; cursor:pointer; font-weight:bold">ԱՎԵԼԱՑՆԵԼ ԿԱՅՔՈՒՄ</button>
    <div id="admin-list" style="margin-top:30px"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyClodivmz2FQiKy7KPpd7t35KW8ZOYCfW8",
    authDomain: "hovakimyan-s-family.firebaseapp.com",
    projectId: "hovakimyan-s-family",
    storageBucket: "hovakimyan-s-family.firebasestorage.app",
    messagingSenderId: "175248908456",
    appId: "1:175248908456:web:cf6a3a6615e9dba756629d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const prodsCol = collection(db, "products");

  let PRODUCTS = [];
  let RATES = { AMD: 1, USD: 400, RUB: 4.5 }; 
  
  async function fetchLiveRates() {
    try {
      const response = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/amd.json');
      const data = await response.json();
      RATES.USD = 1 / data.amd.usd;
      RATES.RUB = 1 / data.amd.rub;
      updateUI();
    } catch (e) { console.log("Default rates used"); }
  }

  let currentLang = 'hy', currentCur = 'AMD', selectedSize = null, currentProduct = null, currentCategory = '', editId = null;

  const TRANSLATIONS = {
    hy: { nav_home:"Գլխավոր", nav_shop:"Խանութ", hero_eyebrow:"PREMIUM COLLECTION", hero_title:"Ստեղծված", hero_title_em:"Նրանց համար", hero_sub:"Պրեմիում կոշիկներ: Բարձրակարգ արհեստ, 39–44 չափսեր:", btn_shop:"Դիտել հավաքածուն", cat_label:"Ոճը ըստ տեսակի", cat_title:"Մեր հավաքածուն", sneakers:"Սպորտային", loafers:"Կոշիկներ", select_size:"Ընտրել չափսը", order_wa:"Պատվիրել WhatsApp-ով", back:"← Վերադառնալ" },
    en: { nav_home:"Home", nav_shop:"Shop", hero_eyebrow:"PREMIUM COLLECTION", hero_title:"Crafted for", hero_title_em:"Excellence", hero_sub:"Premium footwear. Sizes 39–44.", btn_shop:"View Collection", cat_label:"Shop by Category", cat_title:"Our Collection", sneakers:"Sneakers", loafers:"Loafers", select_size:"Select Size", order_wa:"Order via WhatsApp", back:"← Back" },
    ru: { nav_home:"Главная", nav_shop:"Магазин", hero_eyebrow:"ПРЕМИУМ КОЛЛЕКЦИЯ", hero_title:"Создано для", hero_title_em:"Вас", hero_sub:"Обувь ручной работы, размеры 39–44.", btn_shop:"Посмотреть коллекцию", cat_label:"Стиль по типу", cat_title:"Наша коллекция", sneakers:"Кроссовки", loafers:"Лоферы", select_size:"Выберите размер", order_wa:"Заказать через WhatsApp", back:"← Назад" }
  };

  onSnapshot(prodsCol, (snapshot) => {
    PRODUCTS = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    updateUI();
    renderAdminList();
  });

  window.setLang = (l) => {
    currentLang = l;
    document.querySelectorAll('[id^="l"]').forEach(b => b.classList.remove('active-btn'));
    document.getElementById('l'+l.toUpperCase()).classList.add('active-btn');
    updateUI();
  };
  window.setCur = (c) => {
    currentCur = c;
    document.querySelectorAll('[id^="c"]').forEach(b => b.classList.remove('active-btn'));
    document.getElementById('c'+c).classList.add('active-btn');
    updateUI();
  };

  function updateUI() {
    document.querySelectorAll('[data-key]').forEach(el => {
      const key = el.getAttribute('data-key');
      if (TRANSLATIONS[currentLang][key]) el.innerText = TRANSLATIONS[currentLang][key];
    });
    if (PRODUCTS.length > 0) {
        const lastProd = PRODUCTS[PRODUCTS.length - 1];
        document.getElementById('hero-main-img').src = lastProd.img;
    }
    renderCategoryGrids();
    if(currentCategory) renderShop(currentCategory);
    if(currentProduct) refreshDetailPage();
  }

  window.go = (id) => {
    document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
    document.getElementById('pg-' + id).classList.add('on');
    window.scrollTo(0,0);
  };

  window.openShop = (cat) => {
    currentCategory = cat;
    document.getElementById('shop-title').innerText = TRANSLATIONS[currentLang][cat];
    go('shop');
    renderShop(cat);
  };

  function renderCategoryGrids() {
    const getI = (c) => { 
        const p = PRODUCTS.filter(x => x.cat === c); 
        return p.length > 0 ? p[p.length-1].img : "https://via.placeholder.com/600x600?text=Hovakimyan"; 
    };
    const html = `
      <div class="cat-tile" onclick="openShop('sneakers')"><img src="${getI('sneakers')}"><div class="cat-tile-info"><h2 class="cat-name">${TRANSLATIONS[currentLang].sneakers}</h2></div></div>
      <div class="cat-tile" onclick="openShop('loafers')"><img src="${getI('loafers')}"><div class="cat-tile-info"><h2 class="cat-name">${TRANSLATIONS[currentLang].loafers}</h2></div></div>`;
    document.getElementById('home-cat-grid').innerHTML = html;
    document.getElementById('shop-cat-grid').innerHTML = html;
  }

  function renderShop(cat) {
    const grid = document.getElementById('shop-grid');
    grid.innerHTML = '';
    PRODUCTS.filter(p => p.cat === cat).forEach(p => {
      grid.innerHTML += `
        <div class="prod-card" onclick="openDetail('${p.id}')">
          <img src="${p.img}">
          <div class="prod-info">
            <h3 style="font-family:'Cormorant Garamond'; font-size:20px">${p['name_'+currentLang] || p.name_hy}</h3>
            <p style="color:var(--accent); font-family:'Cormorant Garamond'; font-size:20px">${formatPrice(p.price)}</p>
          </div>
        </div>`;
    });
  }

  window.openDetail = (id) => {
    currentProduct = PRODUCTS.find(x => x.id === id);
    selectedSize = null;
    refreshDetailPage();
    go('detail');
  };

  function refreshDetailPage() {
    const p = currentProduct;
    if(!p) return;
    document.getElementById('detail-content').innerHTML = `
      <div class="det-img"><img src="${p.img}"></div>
      <div class="det-info">
        <h1 style="font-family:'Cormorant Garamond'; font-size:42px">${p['name_'+currentLang] || p.name_hy}</h1>
        <div style="font-size:28px; color:var(--accent); margin:20px 0">${formatPrice(p.price)}</div>
        <p style="text-transform:uppercase; font-size:11px; color:var(--mid)">${TRANSLATIONS[currentLang].select_size}</p>
        <div class="size-grid">${[39,40,41,42,43,44].map(s => `<div class="sz ${selectedSize===s?'on':''}" onclick="window.selSz(this,${s})">${s}</div>`).join('')}</div>
        <p style="margin-bottom:40px; line-height:1.8; color:var(--mid)">${p['desc_hy'] || ''}</p>
        <button class="btn-wa" onclick="window.orderWA()">${TRANSLATIONS[currentLang].order_wa}</button>
        <p onclick="go('shop')" style="margin-top:30px; cursor:pointer; text-decoration:underline">← ${TRANSLATIONS[currentLang].back}</p>
      </div>`;
  }

  window.selSz = (el, s) => { selectedSize = s; refreshDetailPage(); };
  
  window.orderWA = () => {
    if(!selectedSize) return alert("Ընտրեք չափսը");
    const text = `Ողջույն, ցանկանում եմ պատվիրել:\nՄոդել: ${currentProduct.name_hy}\nՉափս: ${selectedSize}\nԳին: ${formatPrice(currentProduct.price)}`;
    window.open(`https://wa.me/37498930066?text=${encodeURIComponent(text)}`);
  };

  function formatPrice(p) {
    const v = Math.round(p / RATES[currentCur]);
    return currentCur==='AMD'? v.toLocaleString()+' ֏' : (currentCur==='USD'? '$'+v : v.toLocaleString()+' ₽');
  }

  // FIREBASE ACTIONS
  window.addNewProduct = async () => {
    const btn = document.getElementById('adm-main-btn');
    const imgData = document.getElementById('adm-img-base64').value;
    const name_hy = document.getElementById('adm-name-hy').value;
    const price = parseInt(document.getElementById('adm-price').value);

    if(!imgData || !name_hy || isNaN(price)) return alert("Խնդրում ենք լրացնել բոլոր դաշտերը:");

    btn.innerText = "Բեռնվում է...";
    btn.disabled = true;

    const data = {
      img: imgData,
      cat: document.getElementById('adm-cat').value,
      name_hy: name_hy,
      name_en: document.getElementById('adm-name-en').value || name_hy,
      name_ru: document.getElementById('adm-name-ru').value || name_hy,
      price: price,
      desc_hy: document.getElementById('adm-desc-hy').value
    };

    try {
      if(editId) {
        await updateDoc(doc(db,"products",editId), data);
        editId = null;
        alert("Ապրանքը թարմացվեց:");
      } else {
        await addDoc(prodsCol, data);
        alert("Ապրանքը հաջողությամբ ավելացվեց:");
      }
      clearForm();
    } catch(e) {
      console.error(e);
      alert("Սխալ. Firestore-ը մերժեց տվյալները: Նկարը նույնիսկ սեղմելուց հետո գերազանցում է 1MB-ը:");
    } finally {
      btn.disabled = false;
      btn.innerText = editId ? "ՊԱՀՊԱՆԵԼ" : "ԱՎԵԼԱՑՆԵԼ ԿԱՅՔՈՒՄ";
    }
  };

  window.deleteProduct = async (id) => { if(confirm("Ջնջե՞լ այս մոդելը:")) await deleteDoc(doc(db,"products",id)); };
  
  window.editProduct = (id) => {
    const p = PRODUCTS.find(x=>x.id===id);
    editId = id;
    document.getElementById('adm-name-hy').value = p.name_hy;
    document.getElementById('adm-price').value = p.price;
    document.getElementById('adm-desc-hy').value = p.desc_hy || '';
    document.getElementById('adm-img-base64').value = p.img;
    document.getElementById('adm-cat').value = p.cat;
    document.getElementById('adm-main-btn').innerText = "ՊԱՀՊԱՆԵԼ ՓՈՓՈԽՈՒԹՅՈՒՆՆԵՐԸ";
    window.scrollTo(0, document.getElementById('admin-panel').offsetTop);
  };

  function renderAdminList() {
    const l = document.getElementById('admin-list');
    l.innerHTML = '<h4>Ապրանքների ցուցակ</h4>';
    PRODUCTS.forEach(p => {
      l.innerHTML += `<div class="admin-prod-item" style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; align-items:center;"><span>${p.name_hy}</span> <div><button onclick="window.editProduct('${p.id}')" style="padding:5px; margin-right:5px">Փոխել</button><button onclick="window.deleteProduct('${p.id}')" style="padding:5px; background:red; color:white; border:none; cursor:pointer">Ջնջել</button></div></div>`;
    });
  }

  function clearForm() {
    document.getElementById('adm-file').value = '';
    document.getElementById('adm-img-base64').value = '';
    document.getElementById('adm-name-hy').value = '';
    document.getElementById('adm-name-en').value = '';
    document.getElementById('adm-name-ru').value = '';
    document.getElementById('adm-price').value = '';
    document.getElementById('adm-desc-hy').value = '';
    document.getElementById('file-size-info').innerText = '';
  }

  // ԲԱՐՁՐ ՈՐԱԿԻ ՍԵՂՄՈՒՄ (800px & 0.8 quality)
  document.getElementById('adm-file').onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let ctx = canvas.getContext('2d');
        
        // Մեծացված լայնություն՝ 800px (ավելի լավ դետալների համար)
        let maxW = 800; 
        let scale = maxW / img.width;
        if(img.width <= maxW) scale = 1;
        
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        // Բարձրացված որակ՝ 0.8 (նախկին 0.5-ի փոխարեն)
        let quality = 0.8;
        let dataURL = canvas.toDataURL('image/jpeg', quality);
        
        // Անվտանգության ցիկլ՝ միայն եթե 1MB-ից անցնի (Base64-ը հաշվի առած)
        while (dataURL.length > 950000 && quality > 0.1) {
            quality -= 0.05;
            dataURL = canvas.toDataURL('image/jpeg', quality);
        }

        document.getElementById('adm-img-base64').value = dataURL;
        const sizeKB = Math.round((dataURL.length * 3/4) / 1024);
        document.getElementById('file-size-info').innerText = "Օպտիմալացված չափսը՝ ~" + sizeKB + " KB";
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  let tapCount = 0;
  document.getElementById('admin-trigger').onclick = () => {
    tapCount++;
    if(tapCount === 3) { 
        if(prompt("Գաղտնաբառ") === "vika1998areg") document.getElementById('admin-panel').style.display='block'; 
        tapCount = 0; 
    }
  };

  fetchLiveRates();
  window.setLang('hy');
  window.setCur('AMD');
</script>
</body>
